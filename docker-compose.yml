  #     - prometheus

# Định nghĩa Volume để lưu trữ data của Postgres (không bị mất data khi tắt container)
volumes:
  postgres_data:
  grafana_data: # Thêm volume để lưu cấu hình dashboard không bị mất khi tắt docker

# Định nghĩa Network nội bộ để 2 container kết nối được với nhau
networks:
  trello_network:
    driver: bridge
